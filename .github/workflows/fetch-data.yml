name: Fetch frost data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch frost data from Trafikverket
        env:
          TRAFIKVERKET_API_KEY: ${{ secrets.TRAFIKVERKET_API_KEY }}
        run: |
          cat > /tmp/query.xml <<EOF
          <REQUEST>
            <LOGIN authenticationkey="${TRAFIKVERKET_API_KEY}" />
            <QUERY namespace="Road.WeatherInfo" objecttype="FrostDepthObservation" schemaversion="1" orderby="FrostDepth.Sample desc" limit="2000">
              <FILTER>
                <GT name="FrostDepth.Sample" value="\$dateadd(-2.00:00:00)" />
              </FILTER>
              <INCLUDE>Measurepoint.Id</INCLUDE>
              <INCLUDE>Measurepoint.Name</INCLUDE>
              <INCLUDE>Measurepoint.Geometry.WGS84</INCLUDE>
              <INCLUDE>FrostDepth.Sample</INCLUDE>
              <INCLUDE>FrostDepth.Temperature</INCLUDE>
            </QUERY>
          </REQUEST>
          EOF

          curl -sf -X POST \
            -H "Content-Type: text/xml" \
            --data-binary @/tmp/query.xml \
            https://api.trafikinfo.trafikverket.se/v2/data.json \
            -o /tmp/data.json

          jq -e '.RESPONSE.RESULT[0].FrostDepthObservation | length > 0' /tmp/data.json > /dev/null

      - name: Push to data branch
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          CUTOFF=$(date -u -d '90 days ago' +'%Y-%m-%d')

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git fetch origin data:data 2>/dev/null; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf . --quiet
          fi

          cp /tmp/data.json "${DATE}.json"
          cp /tmp/data.json data.json
          echo "{\"date\":\"${DATE}\"}" > last-updated.json

          for f in ????-??-??.json; do
            [ -f "$f" ] || continue
            d="${f%.json}"
            [[ "$d" < "$CUTOFF" ]] && git rm --quiet "$f"
          done

          ls ????-??-??.json 2>/dev/null | sort | jq -Rsc 'split("\n") | map(select(. != "")) | map(.[:-5])' > manifest.json

          git add "${DATE}.json" data.json last-updated.json manifest.json
          git diff --staged --quiet || git commit -m "data: ${DATE}"
          git push origin data
