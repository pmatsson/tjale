<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="title">Tjäldjupskarta</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <meta name="description" content="Interaktiv karta över aktuellt tjäldjup i Sverige, baserad på Trafikverkets mätstationer. Se var marken är tjälad och hur djupt tjälen går." />
    <meta name="keywords" content="tjäldjup, tjäle, tjälkarta, Sverige, vägväder, Trafikverket, marktemperatur" />
    <meta name="author" content="pmatsson" />
    <link rel="canonical" href="https://frost.foodson.dev/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://frost.foodson.dev/" />
    <meta property="og:title" content="Tjäldjupskarta – Aktuellt tjäldjup i Sverige" />
    <meta property="og:description" content="Interaktiv karta över aktuellt tjäldjup i Sverige, baserad på Trafikverkets mätstationer." />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Tjäldjupskarta – Aktuellt tjäldjup i Sverige" />
    <meta name="twitter:description" content="Interaktiv karta över aktuellt tjäldjup i Sverige, baserad på Trafikverkets mätstationer." />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Tjäldjupskarta",
      "description": "Interaktiv karta över aktuellt tjäldjup i Sverige, baserad på Trafikverkets mätstationer.",
      "url": "https://frost.foodson.dev/",
      "applicationCategory": "Map",
      "inLanguage": ["sv", "en"],
      "isAccessibleForFree": true,
      "author": {
        "@type": "Person",
        "name": "pmatsson"
      }
    }
    </script>

    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="map"></div>

      <div id="panel-title" class="panel">
        <div class="panel-header">
          <h1 data-i18n="title">Tjäldjupskarta</h1>
          <p data-i18n="subtitle">Aktuellt tjäldjup i Sverige</p>
        </div>
        <div class="lang-toggle">
          <button id="btn-sv" class="lang-btn active">SV</button>
          <button id="btn-en" class="lang-btn">EN</button>
        </div>
      </div>

      <div id="panel-controls" class="panel">
        <div class="controls-row">
          <button id="btn-load" data-i18n="refreshButton">Uppdatera</button>
          <div id="opacity-wrap">
            <label data-i18n="opacity" for="opacity-slider">Täckning</label>
            <input id="opacity-slider" type="range" min="0" max="100" value="70" />
          </div>
        </div>
        <p id="status"></p>
      </div>

      <div id="panel-legend" class="panel">
        <p class="legend-title" data-i18n="frostDepth">Tjäldjup</p>
        <div id="legend-gradient"></div>
        <div class="legend-labels">
          <span data-i18n="legendShallow">Ytlig</span>
          <span data-i18n="legendMid">Måttlig</span>
          <span data-i18n="legendDeep">Djup</span>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
