<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="title">Tjälkarta</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <meta name="description" content="Interaktiv karta över tjälläget i Sverige, baserad på Trafikverkets mätstationer. Se var marken är tjälad." />
    <meta name="keywords" content="tjäle, tjälkarta, tjällinje, Sverige, vägväder, Trafikverket, marktemperatur" />
    <meta name="author" content="pmatsson" />
    <link rel="canonical" href="https://frost.foodson.dev/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://frost.foodson.dev/" />
    <meta property="og:title" content="Tjälkarta – Tjälläget i Sverige" />
    <meta property="og:description" content="Interaktiv karta över tjälläget i Sverige, baserad på Trafikverkets mätstationer." />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Tjälkarta – Tjälläget i Sverige" />
    <meta name="twitter:description" content="Interaktiv karta över tjälläget i Sverige, baserad på Trafikverkets mätstationer." />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Tjälkarta",
      "description": "Interaktiv karta över tjälläget i Sverige, baserad på Trafikverkets mätstationer.",
      "url": "https://frost.foodson.dev/",
      "applicationCategory": "Map",
      "inLanguage": ["sv", "en"],
      "isAccessibleForFree": true,
      "author": {
        "@type": "Person",
        "name": "pmatsson"
      }
    }
    </script>
  </head>
  <body>
    <div id="app">
      <div id="map"></div>

      <!-- Top-left: Title + controls -->
      <div id="panel-title" class="panel">
        <div class="title-top">
          <div class="panel-header">
            <h1 data-i18n="title">Tjälkarta</h1>
            <p data-i18n="subtitle">Tjälläget i Sverige</p>
          </div>
          <div class="lang-toggle">
            <button id="btn-sv" class="lang-btn active">SV</button>
            <button id="btn-en" class="lang-btn">EN</button>
          </div>
        </div>
        <div class="title-bottom">
          <div id="opacity-wrap">
            <label data-i18n="opacity" for="opacity-slider">Täckning</label>
            <input id="opacity-slider" type="range" min="0" max="100" value="70" />
          </div>
          <div class="seg-control">
            <button id="btn-mode-depth" class="seg-btn active" data-i18n="modeDepth">Djup</button>
            <button id="btn-mode-line" class="seg-btn" data-i18n="modeFrostLine">Tjällinje</button>
          </div>
          <p id="status"></p>
        </div>
      </div>

      <!-- Bottom-center: Timeline -->
      <div id="panel-timeline" class="panel">
        <div class="tl-controls">
          <button id="btn-prev" class="tl-btn" title="Föregående dag" disabled></button>
          <button id="btn-play" class="tl-btn tl-play" title="Spela upp" disabled></button>
          <button id="btn-next" class="tl-btn" title="Nästa dag" disabled></button>
        </div>
        <div class="tl-slider-wrap">
          <input id="tl-slider" type="range" min="0" max="0" value="0" disabled />
          <div class="tl-range-labels">
            <span id="tl-label-start"></span>
            <span id="tl-label-end"></span>
          </div>
        </div>
        <div class="tl-info">
          <div id="tl-date" class="tl-date">—</div>
          <div id="tl-live" class="tl-live">
            <span class="live-dot"></span>
            <span data-i18n="latest">LIVE</span>
          </div>
        </div>
      </div>

    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
